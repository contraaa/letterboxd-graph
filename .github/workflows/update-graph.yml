name: Update Letterboxd Graph + JSON Export

env:
  LETTERBOXD_USERNAME: "Contra_"
  YEARS: ""                  # e.g. "2026,2025" or empty for current year
  EXPORT_PNG: "false"         # keep false
  WEEK_START: "sunday"
  GRADIENT: "true"

on:
  # Hourly at :07 UTC (change to "0 0 * * *" if you want daily midnight UTC)
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

# Prevent overlapping runs from fighting over commits/pushes
concurrency:
  group: letterboxd-graph-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install curl_cffi fallback
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install curl_cffi

      - name: Generate Graph (best-effort; require JSON)
        run: |
          CMD="node src/cli.js ${{ env.LETTERBOXD_USERNAME }} -o images/github-letterboxd"

          if [ -n "${{ env.YEARS }}" ]; then CMD="$CMD -y ${{ env.YEARS }}"; fi
          if [ "${{ env.WEEK_START }}" = "monday" ]; then CMD="$CMD -w monday"; fi
          if [ "${{ env.GRADIENT }}" = "false" ]; then CMD="$CMD -g false"; fi
          if [ "${{ env.EXPORT_PNG }}" = "true" ]; then CMD="$CMD -p"; fi

          echo "Running: $CMD"

          # Don't fail immediately — opentype.js sometimes throws unsupported GSUB errors during SVG rendering.
          set +e
          eval $CMD
          STATUS=$?
          set -e

          # JSON export is the thing Glance needs (images/letterboxd-data.json). [1](https://opentype.js.org/)
          if [ ! -f images/letterboxd-data.json ]; then
            echo "❌ images/letterboxd-data.json was not generated; failing."
            exit $STATUS
          fi

          if [ $STATUS -ne 0 ]; then
            echo "⚠️ SVG generation failed, but JSON exists — continuing so Glance can update."
          fi

      - name: Commit and push changes (JSON only)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Only commit the JSON that Glance consumes.
          git add images/letterboxd-data.json

          if git diff --staged --quiet; then
            echo "No JSON changes to commit"
            exit 0
          fi

          git commit -m "Update Letterboxd JSON export"
          git push
